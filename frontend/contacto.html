<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Totoabas | Contacto</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root { --bg:#0d1521; --panel:#122034; --line:#23405a; --text:#f8fafc; --soft:#94a3b8; --neon:#13bbc4; }
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Montserrat',sans-serif; color:var(--text); background:radial-gradient(circle at 15% 85%, rgba(43,136,255,.22), transparent 40%), var(--bg); }
.wrap { max-width:880px; margin:0 auto; padding:28px; }
.card { border:1px solid rgba(255,255,255,.14); border-radius:14px; background:linear-gradient(180deg, rgba(18,32,52,.9), rgba(13,23,37,.92)); padding:18px; }
h1 { font-family:'Lexend',sans-serif; margin-bottom:8px; }
p { color:var(--soft); line-height:1.6; margin-bottom:14px; }
.list { display:grid; gap:8px; }
.item { border:1px solid rgba(255,255,255,.12); border-radius:10px; padding:10px; }
a { color:#bef4f7; text-decoration:none; }
.top { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.top a { border:1px solid rgba(19,187,196,.6); border-radius:8px; padding:8px 12px; }
</style>
</head>
<body>
<div class="wrap">
<div class="top"><h1>Contactarnos</h1><a href="index.html">Volver</a></div>
<div class="card">
<p>Canales de atención para coordinación de incidentes, implementación y soporte comercial.</p>
<div class="list">
<div class="item">Operaciones: <a href="mailto:operaciones@totoabas.mx">operaciones@totoabas.mx</a></div>
<div class="item">Soporte: <a href="mailto:soporte@totoabas.mx">soporte@totoabas.mx</a></div>
<div class="item">Comercial: <a href="mailto:comercial@totoabas.mx">comercial@totoabas.mx</a></div>
<div class="item">Teléfono: +52 442 319 7740</div>
</div>
</div>
</div>
</body>
</html>
